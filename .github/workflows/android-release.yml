name: Build APK for Release (Full & FOSS) && Desktop app release

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths-ignore:
      - 'README.md'
      - 'fastlane/**'
      - 'assets/**'
      - '.github/**/*.md'
      - '.github/FUNDING.yml'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: write

jobs:
  build-full-release:
    name: Build full release version
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check signing secrets
        id: signing_secrets
        env:
          BASE_64_SIGNING_KEY: ${{ secrets.BASE_64_SIGNING_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing_vars=()
          for var_name in BASE_64_SIGNING_KEY KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!var_name:-}" ]; then
              missing_vars+=("$var_name")
            fi
          done
          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "Missing required signing secret(s): ${missing_vars[*]}"
            exit 1
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: steps.signing_secrets.outputs.ready == 'true'
        with:
          submodules: 'recursive'

      - name: set up JDK 21
        if: steps.signing_secrets.outputs.ready == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: "zulu"
          cache: 'gradle'

      - name: Update environment variables
        if: steps.signing_secrets.outputs.ready == 'true'
        env:
          BASE_64_SIGNING_KEY: ${{ secrets.BASE_64_SIGNING_KEY }}
        run: |
          set -euo pipefail
          key_store_path="simpmusic.jks"
          if ! printf '%s' "$BASE_64_SIGNING_KEY" | base64 --decode > "$key_store_path"; then
            echo "Failed to decode BASE_64_SIGNING_KEY into $key_store_path. Ensure the secret is valid base64."
            exit 1
          fi
          if [ ! -s "$key_store_path" ]; then
            echo "Decoded keystore file is missing or empty: $key_store_path"
            exit 1
          fi
          key_store_size="$(wc -c < "$key_store_path" | tr -d '[:space:]')"
          echo "Decoded signing keystore size: ${key_store_size} bytes"

      - name: Update build product flavor
        if: steps.signing_secrets.outputs.ready == 'true'
        run: |
          echo "" >> ./gradle.properties
          # Disable Sentry for GitHub workflow APK full release build.
          echo "isFullBuild=false" >> ./gradle.properties

      - name: Build full release APK
        if: steps.signing_secrets.outputs.ready == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing_vars=()
          for var_name in KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!var_name:-}" ]; then
              missing_vars+=("$var_name")
            fi
          done
          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "Missing required signing variable(s) before signing: ${missing_vars[*]}"
            exit 1
          fi
          if [ ! -s simpmusic.jks ]; then
            echo "Signing keystore is missing or empty before signing: simpmusic.jks"
            exit 1
          fi
          key_store_size="$(wc -c < simpmusic.jks | tr -d '[:space:]')"
          echo "Signing precheck passed. Keystore size: ${key_store_size} bytes"
          ./build_and_sign_apk.sh --release --full

      - name: Upload APK
        if: steps.signing_secrets.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-full-release
          path: androidApp/build/outputs/apk/release/*.apk

